version: '3.8'

services:
  soco-cli-api:
    image: skyjia/soco-cli:latest
    container_name: soco-cli-api
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Default speaker (optional, allows omitting speaker name in commands)
      - SPKR=${SPKR:-}
      # Use cached speaker list for faster discovery
      - USE_LOCAL_CACHE=${USE_LOCAL_CACHE:-}
      # Network subnets for HTTP API server discovery (optional)
      - SUBNETS=${SUBNETS:-}
    volumes:
      # Config directory - persists settings, aliases, and speaker cache
      - ./config:/config
      # Local music library - read-only access for play_file, play_m3u, play_directory
      - ${MUSIC_PATH:-/path/to/your/music}:/music:ro
      # Macros file for HTTP API server custom actions
      - ${MACROS_PATH:-./macros.txt}:/home/sonos/macros.txt:ro
    # Host network mode required for SSDP multicast discovery
    network_mode: host
    restart: unless-stopped
    # Default: Start HTTP API server on port 8000
    command: ["http-api-server", "-p", "8000"]

  # Optional: CLI-only container for one-off commands
  soco-cli:
    image: skyjia/soco-cli:latest
    container_name: soco-cli
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SPKR=${SPKR:-}
      - USE_LOCAL_CACHE=${USE_LOCAL_CACHE:-}
    volumes:
      - ./config:/config
      - ${MUSIC_PATH:-/path/to/your/music}:/music:ro
    network_mode: host
    # This service doesn't auto-start; use for ad-hoc commands
    # Example: docker-compose run soco-cli discover
    # Example: docker-compose run soco-cli "Living Room" play
    stdin_open: true
    tty: true
    profiles:
      - cli