name: Build and Push Multi-Architecture Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build (e.g., v0.1.0, latest)'
        required: true
        default: 'latest'

env:
  DOCKER_IMAGE: skyjia/soco-cli

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Extract version from git tag (e.g., v0.1.0 -> 0.1.0)
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "${{ env.DOCKER_IMAGE }}:${TAG}" >> $GITHUB_OUTPUT
            echo "${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.event.inputs.tag }}"
            if [ "${TAG}" = "latest" ]; then
              echo "tags=${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
            else
              # Remove 'v' prefix if present
              TAG="${TAG#v}"
              echo "tags<<EOF" >> $GITHUB_OUTPUT
              echo "${{ env.DOCKER_IMAGE }}:${TAG}" >> $GITHUB_OUTPUT
              echo "${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          provenance: false
          sbom: false

      - name: Image digest
        run: echo "Pushed image digest: ${{ steps.build-push.outputs.digest }}"